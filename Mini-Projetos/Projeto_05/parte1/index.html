<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

    <title>projeto 05</title>
</head>
<body>
    <form action="" method="get" autocomplete="off">
        <fieldset>
            <legend>Formulario de contato</legend>

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite um Email Valido" required >
    
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto" placeholder="Motivo do contato" required>

            <label for="mensagem">Mensagem</label>
            <textarea name="mensagem" id="mensagem" rows="8" cols="40" maxlength="1000" minlength="20" placeholder="Conte-nos tudo" required></textarea>

            <input type="submit" class="btn">
        </fieldset>

    </form>




</body>
</html>
