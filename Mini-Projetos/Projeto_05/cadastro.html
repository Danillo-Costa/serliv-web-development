<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>cadastro</title>
</head>
<body>
    <form action="" method="post" class="form">
        <fieldset>
            <legend class="login_cadastro">cadastre-se</legend>

            <label for="usuario" class="form_label">Usuário</label>
            <input type="text" id="usuario" name="usuario" class="input_form" required>

            <label for="email" class="form_label">Email</label>
            <input type="email" id="email" name="email" class="input_form" required>

            <label for="senha" class="form_label">Senha</label>
            <input type="password" id="senha" name="senha" class="input_form" required>

            <div class="link_cadastro">
                <button type="submit" class="btn">cadastre-se</button>
                <p class="faca_login">já possui cadastro? <a href="login.html">faça login</a></p>
            </div>
        </fieldset>
    </form>


</body>
</html>
