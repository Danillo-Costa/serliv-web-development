<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>login</title>
</head>

<body>
    <form action="" method="post" class="form">
        <fieldset>

            <legend class="login_cadastro">login</legend>

            <label for="usuario" class="form_label">Usuário</label>
            <input type="text" id="usuario" name="usuario" class="input_form" required>

            <label for="senha" class="form_label">senha</label>
            <input type="password" id="senha" name="senha" class="input_form" required>

            <div class="link_login">
                <button type="submit" class="btn">login</button>
                <p class="cadastre-se"><a href="cadastro.html">cadastre-se</a></p>
                <p class="esqueci_senha"><a href="#" >Esqueci minha senha</a></p>
            </div>
        </fieldset>
    </form>



</body>

</html>
